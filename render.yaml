services:
  - type: web
    name: eventify
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://eventify.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: eventify-db # 👈 must match the database name below

databases:
  - name: eventify-db
    plan: free
