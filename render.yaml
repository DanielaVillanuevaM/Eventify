services:
  - type: web
    name: eventify
    env: php
    plan: free
    buildCommand: "composer install && php artisan config:cache && php artisan route:cache && php artisan view:cache"
    startCommand: "php artisan serve --host=0.0.0.0 --port=10000"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromService:
          type: postgres
          name: laravel-db
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        fromService:
          type: postgres
          name: laravel-db
          property: database
      - key: DB_USERNAME
        fromService:
          type: postgres
          name: laravel-db
          property: user
      - key: DB_PASSWORD
        fromService:
          type: postgres
          name: laravel-db
          property: password

databases:
  - name: eventify-db
    plan: free
